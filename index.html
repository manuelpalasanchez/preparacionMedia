<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Maratón · Control de plani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg: #0b0e0d;
  --bg-elev: #121613;
  --bg-card: #161b18;
  --bg-card-hover: #1c221e;
  --line: #262e29;
  --line-strong: #384039;
  --text: #eef1ec;
  --text-dim: #9aa39c;
  --text-faint: #5f6862;
  --accent: #d4ff5c;
  --accent-dim: #7d9137;
  --accent-bg: rgba(212,255,92,0.09);
  --z2: #5c9cd4;
  --z2-bg: rgba(92,156,212,0.1);
  --series: #e8763c;
  --series-bg: rgba(232,118,60,0.1);
  --tirada: #b083e8;
  --tirada-bg: rgba(176,131,232,0.1);
  --carrera: #d4ff5c;
  --carrera-bg: rgba(212,255,92,0.12);
  --deload: #d4a53c;
  --done: #4caf6e;
  --done-bg: rgba(76,175,110,0.12);
  --danger: #e05c5c;
  --font-display: 'Space Grotesk', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 10px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{background:var(--bg); color:var(--text); font-family:var(--font-display); -webkit-font-smoothing:antialiased;}
body{padding-bottom:80px;}
::selection{background:var(--accent); color:#0b0e0d;}
.mono{font-family:var(--font-mono);}
.wrap{max-width:960px; margin:0 auto; padding:0 20px;}

/* ---------- top bar ---------- */
.topbar{
  position:sticky; top:0; z-index:50;
  background:rgba(11,14,13,0.92); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.topbar-inner{display:flex; align-items:center; justify-content:space-between; padding:14px 20px; max-width:960px; margin:0 auto;}
.brand{display:flex; align-items:baseline; gap:10px;}
.brand-mark{font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; color:var(--accent); text-transform:uppercase;}
.brand-title{font-size:16px; font-weight:600;}
.countdown{font-family:var(--font-mono); font-size:12px; color:var(--text-dim); text-align:right;}
.countdown b{color:var(--accent); font-size:14px;}

/* ---------- nav tabs ---------- */
.tabs{
  display:flex; gap:4px; padding:10px 20px; max-width:960px; margin:0 auto;
  overflow-x:auto; scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  font-family:var(--font-mono); font-size:12px; letter-spacing:0.03em;
  padding:8px 14px; border-radius:8px; border:1px solid transparent;
  color:var(--text-dim); background:transparent; cursor:pointer; white-space:nowrap;
  transition:all .15s ease;
}
.tab:hover{color:var(--text); background:var(--bg-card);}
.tab.active{color:var(--bg); background:var(--accent); font-weight:600;}

.view{display:none; padding:24px 0 40px;}
.view.active{display:block; animation:fade .25s ease;}
@keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

/* ---------- section headers ---------- */
.sec-head{display:flex; align-items:baseline; justify-content:space-between; margin:0 0 14px;}
.sec-title{font-size:13px; font-family:var(--font-mono); letter-spacing:0.08em; text-transform:uppercase; color:var(--text-faint);}
.sec-sub{font-size:12px; color:var(--text-dim);}

/* ---------- cards / grid ---------- */
.grid{display:grid; gap:12px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:640px){.grid-3,.grid-4{grid-template-columns:repeat(2,1fr);}}

.card{
  background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px;
}
.stat{padding:14px 16px;}
.stat-label{font-family:var(--font-mono); font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-faint); margin-bottom:6px;}
.stat-value{font-family:var(--font-mono); font-size:26px; font-weight:700; color:var(--text); line-height:1;}
.stat-value small{font-size:13px; font-weight:400; color:var(--text-dim);}
.stat-value.accent{color:var(--accent);}

/* ---------- hero / today ---------- */
.hero{
  background:linear-gradient(180deg, var(--bg-card) 0%, var(--bg-elev) 100%);
  border:1px solid var(--line); border-radius:14px; padding:22px 20px; margin-bottom:20px;
}
.hero-top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px;}
.hero-block-tag{font-family:var(--font-mono); font-size:11px; color:var(--accent); letter-spacing:0.06em; text-transform:uppercase;}
.hero-week{font-size:22px; font-weight:600; margin-top:4px;}
.hero-dates{font-family:var(--font-mono); font-size:12px; color:var(--text-dim); margin-top:2px;}
.hero-vol{text-align:right;}
.hero-vol-num{font-family:var(--font-mono); font-size:28px; font-weight:700; color:var(--accent);}
.hero-vol-label{font-size:11px; color:var(--text-dim);}

/* ---------- session cards ---------- */
.session{
  display:flex; align-items:center; gap:14px;
  background:var(--bg-card); border:1px solid var(--line); border-left:3px solid var(--line-strong);
  border-radius:8px; padding:13px 15px; margin-bottom:8px;
  cursor:pointer; transition:all .15s ease;
}
.session:hover{background:var(--bg-card-hover); border-color:var(--line-strong);}
.session.readonly{cursor:default;}
.session.readonly:hover{background:var(--bg-card); border-color:var(--line);}
.session.done{opacity:0.55;}
.session.done .session-label{text-decoration:line-through; text-decoration-color:var(--text-faint);}
.session.type-z2a, .session.type-z2b{border-left-color:var(--z2);}
.session.type-series{border-left-color:var(--series);}
.session.type-tirada{border-left-color:var(--tirada);}
.session.type-carrera{border-left-color:var(--carrera);}
.session.type-descanso{border-left-color:var(--text-faint); opacity:0.6;}

.session-day{
  font-family:var(--font-mono); font-size:10px; color:var(--text-faint);
  width:34px; flex-shrink:0; text-align:center; line-height:1.3;
}
.session-day b{display:block; font-size:14px; color:var(--text-dim);}
.session-check{
  width:22px; height:22px; border-radius:50%; border:1.5px solid var(--line-strong);
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .15s ease; font-size:13px; color:transparent;
}
.session-check:hover{border-color:var(--accent);}
.session.done .session-check{background:var(--done); border-color:var(--done); color:#0b0e0d;}
.session-body{flex:1; min-width:0;}
.session-label{font-size:14px; font-weight:600; margin-bottom:2px;}
.session-detail{font-size:12px; color:var(--text-dim); font-family:var(--font-mono); line-height:1.4;}
.session-tag{
  font-family:var(--font-mono); font-size:9px; letter-spacing:0.05em; text-transform:uppercase;
  padding:3px 7px; border-radius:5px; flex-shrink:0;
}
.session.type-z2a .session-tag, .session.type-z2b .session-tag{background:var(--z2-bg); color:var(--z2);}
.session.type-series .session-tag{background:var(--series-bg); color:var(--series);}
.session.type-tirada .session-tag{background:var(--tirada-bg); color:var(--tirada);}
.session.type-carrera .session-tag{background:var(--carrera-bg); color:var(--carrera);}

.checkpoint-flag{
  display:flex; gap:8px; align-items:flex-start; background:var(--accent-bg);
  border:1px solid var(--accent-dim); border-radius:8px; padding:10px 12px; margin:10px 0;
  font-size:12px; color:var(--text);
}
.checkpoint-flag b{color:var(--accent);}
.note-flag{
  font-size:12px; color:var(--text-dim); background:var(--bg-elev); border:1px solid var(--line);
  border-radius:8px; padding:9px 12px; margin:10px 0; font-style:italic;
}
.deload-flag{
  display:inline-flex; align-items:center; gap:5px; font-family:var(--font-mono); font-size:10px;
  letter-spacing:0.05em; text-transform:uppercase; color:var(--deload); background:rgba(212,165,60,0.1);
  border:1px solid rgba(212,165,60,0.3); padding:3px 8px; border-radius:5px;
}

/* ---------- legend ---------- */
.legend{display:flex; flex-wrap:wrap; gap:14px; margin:14px 0; font-size:11px; color:var(--text-dim);}
.legend-item{display:flex; align-items:center; gap:6px;}
.legend-dot{width:9px; height:9px; border-radius:3px;}

/* ---------- calendar / weeks list ---------- */
.week-row{
  background:var(--bg-card); border:1px solid var(--line); border-radius:10px;
  padding:14px 16px; margin-bottom:10px; cursor:pointer; transition:all .15s ease;
}
.week-row:hover{border-color:var(--line-strong); background:var(--bg-card-hover);}
.week-row.current{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset;}
.week-row-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
.week-row-title{display:flex; align-items:baseline; gap:10px;}
.week-num{font-family:var(--font-mono); font-size:12px; color:var(--text-faint);}
.week-block{font-size:14px; font-weight:600;}
.week-dates{font-family:var(--font-mono); font-size:11px; color:var(--text-dim);}
.week-vol{font-family:var(--font-mono); font-size:15px; font-weight:700; color:var(--accent);}
.week-bar-track{height:5px; background:var(--bg-elev); border-radius:3px; overflow:hidden; display:flex; gap:2px;}
.week-bar-seg{height:100%; border-radius:2px;}
.week-progress{font-family:var(--font-mono); font-size:10px; color:var(--text-faint); margin-top:6px;}

/* ---------- charts ---------- */
.chart-card{background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:18px 16px 12px; margin-bottom:16px;}
.chart-title{font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-dim); margin-bottom:12px;}
.chart-wrap{position:relative; width:100%;}

/* ---------- series table ---------- */
.series-table{width:100%; border-collapse:collapse; font-size:12px;}
.series-table th{
  font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:0.04em;
  color:var(--text-faint); text-align:left; padding:8px 10px; border-bottom:1px solid var(--line-strong);
}
.series-table td{padding:9px 10px; border-bottom:1px solid var(--line); font-family:var(--font-mono); font-size:12px;}
.series-table tr:hover td{background:var(--bg-elev);}
.series-table tr.current-row td{background:var(--accent-bg);}
.series-table .pace-cell{color:var(--series); font-weight:700;}

/* ---------- blocks overview ---------- */
.block-band{
  display:flex; align-items:center; gap:0; margin-bottom:18px; border-radius:8px; overflow:hidden;
  border:1px solid var(--line);
}
.block-seg{flex:1; padding:10px 12px; text-align:center; border-right:1px solid var(--line);}
.block-seg:last-child{border-right:none;}
.block-seg-label{font-size:11px; font-weight:600;}
.block-seg-weeks{font-family:var(--font-mono); font-size:9px; color:var(--text-dim); margin-top:2px;}
.block-seg.b0{background:rgba(92,156,212,0.08);}
.block-seg.b1{background:rgba(232,118,60,0.08);}
.block-seg.b2{background:rgba(176,131,232,0.08);}
.block-seg.b3{background:var(--carrera-bg);}

/* ---------- reset ---------- */
.reset-btn{
  font-family:var(--font-mono); font-size:11px; color:var(--text-faint); background:transparent;
  border:1px solid var(--line); border-radius:6px; padding:6px 10px; cursor:pointer;
}
.reset-btn:hover{color:var(--danger); border-color:var(--danger);}

/* ---------- key facts panel ---------- */
.facts-list{display:flex; flex-direction:column; gap:0;}
.fact-row{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line); font-size:13px;}
.fact-row:last-child{border-bottom:none;}
.fact-k{color:var(--text-dim);}
.fact-v{font-family:var(--font-mono); font-weight:600; text-align:right;}

.empty-note{font-size:12px; color:var(--text-faint); text-align:center; padding:20px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">

    <button class="tab" data-view="graficos">Gráficos</button>
    <button class="tab" data-view="anterior">Plani anterior</button>

</div>

<div class="wrap">

  <div class="view" id="view-series"></div>

</div>
